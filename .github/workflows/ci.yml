name: Jal Drishti CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black flake8
      - run: black --check src/ tests/
      - run: flake8 src/ tests/ --max-line-length=120

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml

  validate-data:
    name: Validate GeoJSON Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate GeoJSON files
        run: |
          python -c "
          import json, glob
          files = glob.glob('dashboard/data/**/*.geojson', recursive=True)
          files += glob.glob('dashboard/data/**/*.json', recursive=True)
          for f in files:
              with open(f) as fh:
                  json.load(fh)
              print(f'  ✓ {f}')
          print(f'\n{len(files)} data files validated.')
          "

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, validate-data]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
